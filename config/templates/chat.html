{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <title>NovaTech Assistant</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca&family=Lexend:wght@100..900&display=swap" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Lexend+Deca&family=Lexend:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    </head>

    <body>
        <div class="container">
            <img src="{% static 'imagens/logo.png' %}" alt="Logo NovaTech" class="logo">
            <h1>NovaTec</h1>
            {% csrf_token %}
            <input type="text" id="mensagem">
            <button onclick="enviar()">Enviar</button>
            <div id="resposta"></div>
        </div>
        <script>
            function getCookie(name) {
                const cookieValue = document.cookie
                    .split('; ')
                    .find(row => row.startsWith(name + '='));
                return cookieValue ? decodeURIComponent(cookieValue.split('=')[1]) : '';
            }

            async function enviar() {
                const msg = document.getElementById('mensagem').value;
                const token = getCookie('csrftoken');

                const response = await fetch('/chat/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': token
                    },
                    body: JSON.stringify({ mensagem: msg })
                });

                if (!response.ok) {
                    document.getElementById('resposta').textContent = 'Erro ao enviar mensagem.';
                    return;
                }

                const dados = await response.json();
                document.getElementById('resposta').textContent = dados.resposta;
            }

            document.getElementById("mensagem").addEventListener("keydown", function(event) {
                if (event.key === "Enter") {
                     enviar();
                     }
            });
        </script>
    </body>
</html>
